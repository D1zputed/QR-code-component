<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    html,body{
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: hsl(212, 45%, 89%);
      font-family: "Outfit", sans-serif;
    }
    .attribution { font-size: 0.6875rem; text-align: center; justify-content: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    
    .page-wrapper {
      display: flex;
      justify-content: center; 
      align-items: center;    
      min-height: 100vh;      
      margin: 0;
    }

    .card {
      background-color: hsl(0, 0%, 100%);
      padding: 1rem;           
      max-width: 300px;        
      width: 90%;              
      border-radius: 1rem;  
      
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 
                  0 2px 4px -2px rgba(0, 0, 0, 0.1); 
    }

    .subtitle {
      text-align: center;
      color: hsl(218, 44%, 22%);
    }

    p{
      font-weight: 400;
      text-align: center;
      color: hsl(216, 15%, 48%);
    }

    .round-img {
      max-width: 100%;
      border-radius: 8px;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="card">
      <img src="images/image-qr-code.png" alt="image of a qr code" class="round-img"/>
      <h3 class="subtitle">Improve your front-end skills by building projects</h3>
      <p>Scan the qr code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  </div>

  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/D1zputed">D1zputed</a>.
  </footer>
</body>
</html>
